<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Craft</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <main id="workspace">
            <div id="controls">
                <button id="clear-btn">Clear Workspace</button>
                <button id="reset-btn" onclick="confirmReset()">Reset All Progress</button>
            </div>
        </main>

        <aside id="sidebar">
            <div class="sidebar-header">
                <h1>Discovered</h1>
            </div>
            <div id="inventory"></div>
        </aside>
    </div>

    <script src="game.js"></script>
    <script>
        function confirmReset() {
            if (confirm("This will delete all your discovered items. Are you sure?")) {
                localStorage.removeItem('infinite_craft_save');
                location.reload();
            }
        }
    </script>
</body>
</html>
